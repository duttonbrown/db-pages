<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchaser Console — Dutton Brown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="manage.css">
</head>
<body>
<main class="card card-wide">
  <header>
    <h1>Purchaser Console</h1>
    <p class="subtitle">Triage active requests. Each action enforces the required fields so the data stays clean.</p>
  </header>

  <div class="purchaser-bar">
    <label for="purchaser-name">You are:</label>
    <select id="purchaser-name">
      <option value="">Select your name…</option>
    </select>
    <button type="button" id="refresh-btn" class="link-btn">Refresh</button>
  </div>

  <div id="loading-bar" class="loading-bar" hidden>
    <div class="loading-message">Loading active requests…</div>
    <div class="loading-track"><div class="loading-fill"></div></div>
  </div>

  <div id="error" class="error" hidden></div>

  <div id="empty" class="empty-state" hidden>
    <p>🎉 No active requests. The queue is clear.</p>
  </div>

  <section id="queue"></section>

  <footer class="card-footer">
    <a href="index.html">← Back to submit form</a>
    &nbsp;·&nbsp;
    <a href="https://www.notion.so/34affa524c5b8183998cd29c785e4aa6?v=34affa524c5b814c9807000c5b591c5f&source=copy_link" target="_blank" rel="noopener">Open the Purchase Request Log</a>
  </footer>
</main>

<!-- Action modal: fields swap in based on which action button was clicked -->
<div id="modal" class="modal" hidden>
  <div class="modal-card">
    <header class="modal-header">
      <h2 id="modal-title">Action</h2>
      <button type="button" class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </header>
    <div class="modal-context" id="modal-context"></div>
    <form id="modal-form" class="modal-body"></form>
    <div id="modal-error" class="error" hidden></div>
    <footer class="modal-footer">
      <button type="button" id="modal-cancel" class="secondary">Cancel</button>
      <button type="button" id="modal-submit" class="primary">Confirm</button>
    </footer>
  </div>
</div>

<script src="manage.js"></script>
</body>
</html>
