<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receive Shipments — Dutton Brown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="manage.css">
<link rel="stylesheet" href="receive.css">
</head>
<body>
<div class="app-shell">

<nav class="top-nav" id="top-nav" aria-label="Inventory">
  <div class="top-nav-inner">
    <div class="top-nav-row">
      <a class="top-nav-brand" href="index.html">
        <img src="db-icon.png" class="brandmark" alt="Dutton Brown">
        <span class="top-nav-wordmark">Inventory</span>
      </a>
    </div>
    <ul class="top-nav-tabs" role="tablist">
      <li><a class="top-nav-tab" href="index.html">Submit</a></li>
      <li><a class="top-nav-tab" href="manage.html">Purchaser</a></li>
      <li><a class="top-nav-tab" href="receive.html" aria-current="page">Receive</a></li>
      <li><a class="top-nav-tab" href="status.html">Status</a></li>
    </ul>
  </div>
</nav>

<div class="app-main">
<main class="card card-wide">
  <header class="page-intro">
    <p class="page-eyebrow">Receive shipments</p>
    <h1 class="page-lead">Confirm what arrived. Grouped by PO so a whole box can be received in one click.</h1>
  </header>

  <div class="purchaser-bar">
    <label for="receiver-name">You are:</label>
    <select id="receiver-name">
      <option value="">Select your name…</option>
    </select>
    <button type="button" id="refresh-btn" class="link-btn">Refresh</button>
  </div>

  <div id="loading-bar" class="loading-bar" hidden>
    <div class="loading-message">Loading shipments…</div>
    <div class="loading-track"><div class="loading-fill"></div></div>
  </div>

  <div id="error" class="error" hidden></div>

  <div id="empty" class="empty-state" hidden>
    <p>📦 Nothing waiting to be received. The dock is clear.</p>
  </div>

  <section id="po-list"></section>

  <div class="card-bottom-link">
    <a href="https://www.notion.so/34affa524c5b8183998cd29c785e4aa6?v=34affa524c5b814c9807000c5b591c5f&source=copy_link" target="_blank" rel="noopener">View in Notion ↗</a>
  </div>
</main>
</div>

</div>

<script src="receive.js"></script>
<script>
  (function () {
    var nav = document.getElementById("top-nav");
    if (!nav) return;
    var update = function () {
      if (window.scrollY > 4) nav.classList.add("is-scrolled");
      else nav.classList.remove("is-scrolled");
    };
    update();
    window.addEventListener("scroll", update, { passive: true });
  })();
</script>
</body>
</html>
