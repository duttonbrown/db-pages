<style>
  :root{
    --text:#4a4a4a;
    --text-soft:#7a7a7a;
    --bg:#fafafa;
    --bg-card:#ffffff;
    --border:#e8e6e1;
    --accent:#ff9912;
    --accent-strong:#d97706;
    --color:#7c5cff;
    --finish:#4a4a4a;
    --simple:#0e9f6e;
    --warn:#c0392b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Poppins',system-ui,-apple-system,sans-serif;
    font-weight:300;
    color:var(--text);
    background:var(--bg);
    font-size:14px;
    line-height:1.5;
  }
  header{
    background:var(--bg-card);
    border-bottom:1px solid var(--border);
    padding:24px 40px;
    display:flex;justify-content:space-between;align-items:center;
    position:sticky;top:0;z-index:10;
  }
  header h1{
    margin:0;font-weight:300;font-size:22px;letter-spacing:-0.01em;
  }
  header .built-at{font-size:12px;color:var(--text-soft)}
  .totals{
    display:flex;gap:24px;padding:20px 40px;
    background:var(--bg-card);border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .totals .stat{display:flex;align-items:baseline;gap:8px}
  .totals .stat strong{font-size:20px;font-weight:300;color:var(--text)}
  .totals .stat .accent strong{color:var(--accent-strong)}
  .toolbar{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    padding:16px 40px;background:var(--bg-card);border-bottom:1px solid var(--border);
  }
  .toolbar .label{color:var(--text-soft);font-size:12px;text-transform:uppercase;letter-spacing:0.04em;margin-right:8px}
  button{
    font-family:inherit;font-weight:400;font-size:13px;
    padding:8px 14px;border:1px solid var(--border);background:#fff;color:var(--text);
    border-radius:4px;cursor:pointer;transition:all 0.15s;
  }
  button:hover{border-color:var(--text)}
  button.active{background:var(--text);color:#fff;border-color:var(--text)}
  button.release{
    background:var(--accent);color:#fff;border-color:var(--accent);
    font-weight:400;padding:10px 18px;margin-left:auto;font-size:14px;
  }
  button.release:hover{background:var(--accent-strong);border-color:var(--accent-strong)}
  main{padding:24px 40px 80px}
  .order{
    background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
    margin-bottom:10px;overflow:hidden;
  }
  .order-head{
    display:grid;grid-template-columns:110px 1fr auto auto;gap:14px;
    padding:10px 16px;align-items:center;border-bottom:1px solid var(--border);
  }
  .order-head .num{font-weight:400;font-size:14px}
  .order-head .num a{color:var(--text);text-decoration:none}
  .order-head .num a:hover{color:var(--accent-strong)}
  .order-head .cust{color:var(--text-soft);font-size:12px}
  .order-head .meta{
    display:flex;flex-direction:column;gap:3px;align-items:flex-end;
    font-size:10px;
  }
  .pill{
    padding:1px 8px;border-radius:99px;font-size:10px;font-weight:400;
    border:1px solid var(--border);letter-spacing:0.02em;
  }
  .pill.exp{border-color:var(--warn);color:var(--warn)}
  .pill.large{border-color:#888;color:#888}
  .pill.printed{border-color:var(--simple);color:var(--simple)}
  .pill.trade{border-color:#d44a8a;color:#d44a8a}
  .pill.redo{border-color:#a36ac8;color:#a36ac8}
  .pill.quick{border-color:var(--simple);color:var(--simple)}
  .pages{
    display:flex;align-items:baseline;gap:5px;
  }
  .pages strong{font-size:20px;font-weight:300;color:var(--accent-strong)}
  .pages .lbl{font-size:10px;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.04em}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:7px 16px;text-align:left;border-top:1px solid var(--border)}
  th{font-weight:400;color:var(--text-soft);font-size:10px;text-transform:uppercase;letter-spacing:0.04em;background:#fcfbf9}
  tr.printout td{background:#fff}
  tr.row td{background:#fdfcfa;font-size:11px;color:var(--text-soft)}
  .qty-input{
    width:48px;text-align:center;padding:4px;font-family:inherit;font-size:13px;
    border:1px solid var(--border);border-radius:3px;
  }
  .qty-input:focus{outline:none;border-color:var(--accent)}
  .badge{
    display:inline-block;padding:1px 8px;border-radius:3px;font-size:11px;font-weight:400;
    margin-right:4px;
  }
  .badge.color{background:#efe9ff;color:var(--color)}
  .badge.finish{background:#eee;color:var(--finish)}
  .badge.simple{background:#e1f6ec;color:var(--simple)}
  .badge.location{background:#fff3e0;color:var(--accent-strong);border:1px solid #ffe0b2}
  .badge.location.shipping{background:#e1f6ec;color:var(--simple);border-color:#c0e6d3}
  .badge.location.assembly{background:#eee;color:var(--finish);border-color:#ddd}
  .review-note{color:var(--warn);font-size:11px;margin-top:4px}
  .empty{padding:60px 40px;text-align:center;color:var(--text-soft)}
  .split-btn{
    background:none;border:1px solid var(--border);padding:2px 8px;font-size:11px;
    cursor:pointer;border-radius:3px;color:var(--text-soft);
  }
  .split-btn:hover{border-color:var(--accent);color:var(--accent-strong)}
  details{font-size:12px;color:var(--text-soft);margin-top:4px}
  summary{cursor:pointer;outline:none}
  details ul{margin:4px 0 0;padding-left:18px}
</style>
</head>

let SORT = "chrono";

function fmtDate(s){
  if(!s) return "";
  try{ return new Date(s).toISOString().slice(0,10); }catch(e){ return s; }
}
function isQuickBuild(o){
  return (o.auto_tags||[]).some(t => /quick.build/i.test(t));
}
function isSampleOnly(o){
  return (o.printouts||[]).every(p => p.source === "sample-only");
}
function dominantColor(o){
  const colors = (o.printouts||[]).filter(p=>p.color).map(p=>p.color);
  return colors[0] || "";
}

function sortOrders(orders){
  const copy = orders.slice();
  if(SORT === "chrono"){
    copy.sort((a,b)=>(a.created_at||"").localeCompare(b.created_at||""));
  }else if(SORT === "samplesfirst"){
    copy.sort((a,b)=>{
      const ka = isSampleOnly(a) ? 0 : isQuickBuild(a) ? 1 : 2;
      const kb = isSampleOnly(b) ? 0 : isQuickBuild(b) ? 1 : 2;
      if(ka !== kb) return ka - kb;
      return (a.created_at||"").localeCompare(b.created_at||"");
    });
  }else if(SORT === "bycolor"){
    copy.sort((a,b)=>{
      const ka = isSampleOnly(a) ? 0 : isQuickBuild(a) ? 1 : 2;
      const kb = isSampleOnly(b) ? 0 : isQuickBuild(b) ? 1 : 2;
      if(ka !== kb) return ka - kb;
      const ca = dominantColor(a), cb = dominantColor(b);
      if(ca !== cb) return ca.localeCompare(cb);
      return (a.created_at||"").localeCompare(b.created_at||"");
    });
  }
  return copy;
}

function setSort(btn, mode){
  document.querySelectorAll(".toolbar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  SORT = mode;
  render();
}

function locationClass(loc){
  if(loc === "Shipping") return "shipping";
  if(loc === "Assembly") return "assembly";
  return "";
}

function renderOrder(o){
  const printouts = (o.printouts||[]).map((p,idx) => `
    <tr class="printout">
      <td>
        <span class="badge ${p.source}">${p.source.toUpperCase()}</span>
        ${p.color ? `<span class="badge color">${p.color}</span>` : ""}
        ${p.finish ? `<span class="badge finish">${p.finish}</span>` : ""}
        <span class="badge location ${locationClass(p.location)}">${p.location}</span>
        <strong>${(p.parent_skus||[]).join(", ") || "—"}</strong>
        <details><summary>${(p.line_item_titles||[]).length} line item${(p.line_item_titles||[]).length===1?"":"s"} · qty ${p.total_qty}</summary>
          <ul>${(p.line_item_titles||[]).map(t=>`<li>${t}</li>`).join("")}</ul>
        </details>
        ${p.notes ? `<div class="review-note">⚠ ${p.notes}</div>` : ""}
      </td>
      <td>
        <input class="qty-input" type="number" min="1" max="50"
          value="${p.page_count}"
          data-order="${o.shopify_order_id}" data-printout="${idx}"
          onchange="updatePages(this)" />
        <button class="split-btn" onclick="splitPage('${o.shopify_order_id}', ${idx})">Split +1</button>
      </td>
    </tr>
  `).join("");

  const rows = (o.notion_rows||[]).map(r => `
    <tr class="row">
      <td colspan="2">
        <span class="badge location ${locationClass(r.location)}">${r.location}</span>
        Notion row · ${r.parent_sku} · qty ${r.qty}
        ${r.color ? `<span class="badge color">${r.color}</span>` : ""}
        ${r.finish && !r.color ? `<span class="badge finish">${r.finish}</span>` : ""}
        ${r.review_note ? `<div class="review-note">⚠ ${r.review_note}</div>` : ""}
      </td>
    </tr>
  `).join("");

  const tags = (o.tags||"").toLowerCase();
  const pills = [];
  if(o.priority === "Expedites") pills.push(`<span class="pill exp">EXPEDITE</span>`);
  if(isQuickBuild(o)) pills.push(`<span class="pill quick">QUICK</span>`);
  if(o.is_large_order) pills.push(`<span class="pill large">LARGE</span>`);
  if(tags.includes("trade")) pills.push(`<span class="pill trade">TRADE</span>`);
  if(tags.includes("redo")) pills.push(`<span class="pill redo">REDO</span>`);
  if(tags.includes("printed")) pills.push(`<span class="pill printed">PRINTED</span>`);

  const orderLabel = o.shopify_url
    ? `<a href="${o.shopify_url}" target="_blank">${o.shopify_order_name}</a>`
    : o.shopify_order_name;
  const meta = o.customer_name
    ? `${o.customer_name} · ${fmtDate(o.created_at)}`
    : fmtDate(o.created_at);
  return `
    <article class="order">
      <div class="order-head">
        <div class="num">${orderLabel}</div>
        <div class="cust">${meta}</div>
        <div class="meta">${pills.join("")}</div>
        <div class="pages"><strong id="pc-${o.shopify_order_id}">${o.predicted_page_count}</strong><span class="lbl">pages</span></div>
      </div>
      <table>
        <thead><tr><th>Printout / Notion Row</th><th>Pages</th></tr></thead>
        <tbody>${printouts}${rows}</tbody>
      </table>
    </article>
  `;
}

function render(){
  if(!QUEUE){
    document.querySelector("main").innerHTML = `<div class="empty">No queue data loaded. Run <code>python print_queue.py</code> first.</div>`;
    return;
  }
  if(QUEUE.public_redacted){
    document.getElementById("publicBanner").style.display = "block";
    const rb = document.getElementById("releaseBtn");
    if(rb){ rb.style.display = "none"; }
  }
  document.getElementById("builtAt").textContent = "Built " + (QUEUE.built_at || "—");
  const t = QUEUE.totals || {};
  document.getElementById("totals").innerHTML = `
    <div class="stat"><strong>${t.orders||0}</strong> orders</div>
    <div class="stat accent"><strong>${t.printouts||0}</strong> predicted pages</div>
    <div class="stat"><strong>${t.notion_rows||0}</strong> Notion rows</div>
    <div class="stat"><strong>${t.skipped_already_printed||0}</strong> skipped (already printed)</div>
  `;
  const sorted = sortOrders(QUEUE.orders || []);
  document.getElementById("orders").innerHTML = sorted.map(renderOrder).join("") || `<div class="empty">No orders pending print.</div>`;
}

function updatePages(input){
  const orderId = input.dataset.order;
  const idx = +input.dataset.printout;
  const newCount = parseInt(input.value, 10);
  const order = QUEUE.orders.find(o=>o.shopify_order_id === orderId);
  if(!order) return;
  order.printouts[idx].page_count = newCount;
  // Track adjustments for training-data log
  order.printouts[idx].manager_adjusted = true;
  recalcOrderTotal(order);
}
function splitPage(orderId, idx){
  const order = QUEUE.orders.find(o=>o.shopify_order_id === orderId);
  if(!order) return;
  order.printouts[idx].page_count += 1;
  order.printouts[idx].manager_adjusted = true;
  recalcOrderTotal(order);
  render();
}
function recalcOrderTotal(order){
  order.predicted_page_count = order.printouts.reduce((s,p)=>s+(p.page_count||0),0);
  const el = document.getElementById("pc-"+order.shopify_order_id);
  if(el) el.textContent = order.predicted_page_count;
  // Update overall total too
  const tot = QUEUE.orders.reduce((s,o)=>s+(o.predicted_page_count||0),0);
  document.getElementById("totals").querySelector(".accent strong").textContent = tot;
  if(QUEUE.totals) QUEUE.totals.printouts = tot;
}
function downloadRelease(){
  const payload = {
    released_at: new Date().toISOString(),
    sort_mode: SORT,
    queue: QUEUE,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "release.json";
  a.click();
  URL.revokeObjectURL(url);
}
render();
</script>
